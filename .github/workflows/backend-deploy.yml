name: Deploy Backend to Azure App Service

on:
  push:
    branches: [ "main" ]
    paths: 
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'clientportaldss'  # TODO: Replace with your actual App Service name
  PYTHON_VERSION: '3.14'  # Update if using a different Python version

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python version
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Create virtual environment and install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install -r backend/requirements.txt

    - name: Zip backend for deployment
      run: |
        cd backend
        zip -r release.zip . -x "venv/*" "__pycache__/*" "*.pyc" ".env"

    - name: Deploy Backend to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
        package: backend/release.zip
